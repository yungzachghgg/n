[nixpacks]
distribution = "ubuntu"

[nixpacks.phases.setup]
nixPkgs = ["php", "phpExtensions.pdo", "phpExtensions.pdo_mysql", "phpExtensions.mbstring", "phpExtensions.json", "phpExtensions.curl", "phpExtensions.session"]

[nixpacks.phases.build]
cmds = [
  "mkdir -p /app",
  "cp -r * /app/",
  "chmod -R 755 /app"
]

[nixpacks.phases.start]
cmds = [
  "cd /app && php -S 0.0.0.0:$PORT"
]

[nixpacks.env]
PHP_INI_DIR = "/etc/php/8.1/cli"
PHP_MEMORY_LIMIT = "256M"
PHP_MAX_EXECUTION_TIME = "300"
PHP_UPLOAD_MAX_FILESIZE = "64M"
PHP_POST_MAX_SIZE = "64M"
